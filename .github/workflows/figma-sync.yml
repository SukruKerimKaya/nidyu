name: "Figma to Code Sync"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Her gece saat 00:00'da çalışır

jobs:
  figma-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci || npm install --legacy-peer-deps
        
      - name: Fetch Figma Design Tokens
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: |
          echo "🌐 Figma API üzerinden tasarım token'ları çekiliyor..."
          node scripts/sync-figma-tokens.js
          
      - name: Check for changes & Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(design-system): sync figma tokens"
          title: "🎨 Design System Update: Figma Tokens Sync"
          body: |
            ## Figma Tasarım Sistemi Güncellemesi
            Figma `Ready to Dev Final` dosyasında bir veya birden fazla token değişikliği (renk veya tipografi vb.) tespit edildi.
            
            Bu PR otomatik olarak oluşturulmuştur.
            
            Lütfen değişiklikleri inceleyip `main` dalına (branch) birleştirin.
          branch: "figma-sync/tokens"
          delete-branch: true
